---
- name: Cluster Bloom - RKE2 Kubernetes Cluster Setup
  hosts: all
  become: yes
  gather_facts: true
  gather_subset:
    - min
    - network
  vars:
    FIRST_NODE: true
    GPU_NODE: true
    CONTROL_PLANE: false
    DOMAIN: ""
    CLUSTER_SIZE: medium
    SERVER_IP: ""
    JOIN_TOKEN: ""
    NO_DISKS_FOR_CLUSTER: false
    CLUSTER_DISKS: []
    CLUSTER_PREMOUNTED_DISKS: ""
    USE_CERT_MANAGER: false
    CERT_OPTION: ""
    TLS_CERT: ""
    TLS_KEY: ""
    ADDITIONAL_OIDC_PROVIDERS: []
    ADDITIONAL_TLS_SAN_URLS: []
    RKE2_VERSION: ""
    RKE2_EXTRA_CONFIG: ""
    
    # DNS Configuration (opt-in for safety)
    # FIX_DNS: Set to true to allow automatic DNS fixes if DNS is broken
    #          Only modifies /etc/resolv.conf if DNS tests fail AND external DNS works
    #          Creates backups before modification with automatic rollback on failure
    #          WARNING: Will overwrite /etc/resolv.conf if DNS is detected as broken
    FIX_DNS: false
    
    # DNSMASQ: Set to true (along with FIX_DNS) to configure dnsmasq on first node
    #          Provides local DNS resolution for cluster.local and custom domains
    #          Disables systemd-resolved and makes /etc/resolv.conf point to 127.0.0.1
    #          Requires FIX_DNS: true to take effect
    #          WARNING: Significantly changes DNS configuration on the system
    DNSMASQ: false
    
    INSTALL_ARGOCD: true
    ARGOCD_VERSION: "v2.14.11"
    CLUSTERFORGE_REPO: "https://github.com/silogen/cluster-forge.git"
    CLUSTERFORGE_RELEASE: "latest"
    rocm_required_version: "7.1.1"  # single source of truth — update this to change ROCm version
    rocm_deb_build: "70101-1"  # build identifier paired with rocm_required_version
    rocm_base_url: "https://repo.radeon.com/amdgpu-install/{{ rocm_required_version }}/ubuntu/"
    rocm_deb_package: "amdgpu-install_{{ rocm_required_version }}.{{ rocm_deb_build }}_all.deb"
    rke2_installation_url: "https://get.rke2.io"

    supported_ubuntu_versions:
      - "20.04"
      - "22.04"
      - "24.04"

    rke2_ports_tcp:
      - "80"
      - "443"
      - "2376"
      - "2379"
      - "2380"
      - "6443"
      - "9099"
      - "9345"
      - "10250"
      - "10254"
      - "30000:32767"

    rke2_ports_udp:
      - "8472"
      - "30000:32767"

    inotify_target_value: 512
    rancher_min_partition_gb: 500
    bloom_fstab_tag: "# managed by cluster-bloom"

  tasks:
    - name: Pre-deployment Data Safety Validation
      tags: [pre_deployment]
      include_tasks: tasks/data_safety_check.yaml
      vars:
        validate_no_disks_for_cluster: "{{ NO_DISKS_FOR_CLUSTER | default(false) }}"
        validate_cluster_disks: "{{ CLUSTER_DISKS | default('') }}"
        validate_config_file: "{{ ansible_config_file | default('bloom.yaml') }}"

    - name: Node Validation
      tags: [validate_node]
      import_tasks: tasks/validate_node/main.yaml

    - name: Node Preparation
      tags: [prepare_node]
      import_tasks: tasks/prepare_node/main.yaml

    - name: Deploy Cluster Tasks
      tags: [deploy_cluster]
      import_tasks: tasks/deploy_cluster/main.yaml

    - name: Deploy Kubernetes Applications
      tags: [deploy_k8s_apps]
      import_tasks: tasks/deploy_k8s_apps/main.yaml

    - name: Deploy ClusterForge Platform
      tags: [deploy_clusterforge]
      import_tasks: tasks/deploy_clusterforge/main.yaml

  handlers:
    - name: Restart multipathd
      service:
        name: multipathd
        state: restarted

    - name: Create iptables directory
      ansible.builtin.file:
        path: /etc/iptables
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Save iptables
      shell: iptables-save > /etc/iptables/rules.v4
      ignore_errors: yes

    - name: Set permissions on iptables rules file
      ansible.builtin.file:
        path: /etc/iptables/rules.v4
        owner: root
        group: root
        mode: '0644'

    - name: Reload udev
      shell: |
        udevadm control --reload-rules
        udevadm trigger

    - name: Restart chronyd
      service:
        name: chronyd
        state: restarted

    - name: Restart rsyslog
      service:
        name: rsyslog
        state: restarted