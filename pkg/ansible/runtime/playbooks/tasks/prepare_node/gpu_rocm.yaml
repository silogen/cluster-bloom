---
# Purpose: Install and configure AMD ROCm for GPU support
# Dependencies: GPU_NODE, rocm_required_version, rocm_base_url, rocm_deb_package variables
# Usage: Imported by prepare_node/main.yaml (conditional on GPU_NODE)
# Tags: [gpu, rocm, prep_node]

- name: Discover ROCm installation root (handles /opt/rocm symlink and versioned installs)
  shell: |
    set -e
    has_tool() {
      [ -x "$1/bin/amd-smi" ] || [ -x "$1/bin/rocm-smi" ]
    }
    has_version() {
      c="$1"
      if [ -f "$c/.info/version" ] || [ -f "$c/core/.info/version" ]; then
        return 0
      fi
      for f in "$c"/core-*/.info/version; do
        [ -f "$f" ] && return 0
      done
      return 1
    }
    # Prefer /opt/rocm, then the newest versioned sibling. A stale, incomplete
    # /opt/rocm (e.g. a leftover core-only tree from a different ROCm train) can
    # carry a .info/version but no bin/, so give priority to roots that actually
    # contain the ROCm tooling before falling back to a version marker alone.
    candidates="/opt/rocm $(ls -d /opt/rocm-* 2>/dev/null | sort -V -r)"
    for d in $candidates; do
      [ -e "$d" ] || continue
      if has_tool "$d"; then
        echo "$d"
        exit 0
      fi
    done
    for d in $candidates; do
      [ -e "$d" ] || continue
      if has_version "$d"; then
        echo "$d"
        exit 0
      fi
    done
    exit 1
  register: rocm_root_discovery
  changed_when: false
  failed_when: false

- name: Set ROCm root path
  set_fact:
    rocm_root: "{{ (rocm_root_discovery.stdout | trim) if (rocm_root_discovery.rc == 0 and (rocm_root_discovery.stdout | trim) != '') else '/opt/rocm' }}"

- name: Report resolved ROCm root
  debug:
    msg: "Using ROCm root: {{ rocm_root }}"

# Resolve the SMI tooling by searching PATH (amd-smi is installed to /usr/bin via
# update-alternatives) and every /opt/rocm*/bin, not just {{ rocm_root }}/bin.
# This makes detection robust when rocm_root points at an incomplete tree (e.g. a
# stale /opt/rocm that shadows the real versioned install), so we never fall back
# to the nonexistent rocm-smi on a working ROCm 7.x node.
- name: Locate amd-smi binary (ROCm 7.x)
  shell: |
    set -e
    for c in "$(command -v amd-smi 2>/dev/null)" \
             "{{ rocm_root }}/bin/amd-smi" \
             /opt/rocm/bin/amd-smi \
             $(ls -d /opt/rocm-*/bin/amd-smi 2>/dev/null | sort -V -r); do
      if [ -n "$c" ] && [ -x "$c" ]; then
        echo "$c"
        exit 0
      fi
    done
    exit 1
  register: amd_smi_locate
  changed_when: false
  failed_when: false

- name: Locate rocm-smi binary (legacy ROCm fallback)
  shell: |
    set -e
    for c in "$(command -v rocm-smi 2>/dev/null)" \
             "{{ rocm_root }}/bin/rocm-smi" \
             /opt/rocm/bin/rocm-smi \
             $(ls -d /opt/rocm-*/bin/rocm-smi 2>/dev/null | sort -V -r); do
      if [ -n "$c" ] && [ -x "$c" ]; then
        echo "$c"
        exit 0
      fi
    done
    exit 1
  register: rocm_smi_locate
  changed_when: false
  failed_when: false

- name: Set ROCm tool presence
  set_fact:
    amd_smi_bin: "{{ amd_smi_locate.stdout | trim }}"
    rocm_smi_bin: "{{ rocm_smi_locate.stdout | trim }}"
    amd_smi_present: "{{ amd_smi_locate.rc == 0 and (amd_smi_locate.stdout | trim) != '' }}"
    rocm_smi_present: "{{ rocm_smi_locate.rc == 0 and (rocm_smi_locate.stdout | trim) != '' }}"
    rocm_tools_present: "{{ (amd_smi_locate.rc == 0 and (amd_smi_locate.stdout | trim) != '') or (rocm_smi_locate.rc == 0 and (rocm_smi_locate.stdout | trim) != '') }}"

- name: Get ROCm version from amd-smi header
  shell: "{{ amd_smi_bin }} | head -2 | grep 'ROCm version' | sed -n 's/.*ROCm version: \\([0-9][0-9.]*\\).*/\\1/p'"
  register: rocm_version_output
  changed_when: false
  when: amd_smi_present | bool
  failed_when: false

- name: Locate ROCm version file (legacy and Core SDK layouts)
  shell: |
    set -e
    for p in {{ rocm_root }}/.info/version {{ rocm_root }}/core/.info/version {{ rocm_root }}/core-*/.info/version; do
      for f in $p; do
        if [ -f "$f" ]; then
          echo "$f"
          exit 0
        fi
      done
    done
    exit 1
  register: rocm_version_file_path
  changed_when: false
  failed_when: false
  when: not amd_smi_present | bool or rocm_version_output.rc != 0 or rocm_version_output.stdout == ""

- name: Read ROCm version from file
  slurp:
    src: "{{ rocm_version_file_path.stdout | trim }}"
  register: rocm_version_file
  when:
    - not amd_smi_present | bool or rocm_version_output.rc != 0 or rocm_version_output.stdout == ""
    - rocm_version_file_path.rc == 0
    - rocm_version_file_path.stdout | trim != ""

- name: Set ROCm version fact (amd-smi)
  set_fact:
    rocm_version: "{{ rocm_version_output.stdout | trim }}"
  when:
    - amd_smi_present | bool
    - rocm_version_output.rc == 0
    - rocm_version_output.stdout != ""

- name: Set ROCm version fact (file)
  set_fact:
    rocm_version: "{{ rocm_version_file.content | b64decode | trim }}"
  when:
    - not amd_smi_present | bool or rocm_version_output.rc != 0 or rocm_version_output.stdout == ""
    - rocm_version_file_path is defined
    - rocm_version_file_path.rc == 0
    - rocm_version_file_path.stdout | trim != ""

- name: Normalize detected ROCm version
  set_fact:
    rocm_version_normalized: "{{ rocm_version | regex_replace('^([0-9]+\\.[0-9]+\\.[0-9]+).*', '\\1') }}"
    rocm_required_normalized: "{{ rocm_required_version | regex_replace('^([0-9]+\\.[0-9]+\\.[0-9]+).*', '\\1') }}"
  when: rocm_version is defined and rocm_version | trim != ""

- name: Normalize required ROCm version
  set_fact:
    rocm_required_normalized: "{{ rocm_required_version | regex_replace('^([0-9]+\\.[0-9]+\\.[0-9]+).*', '\\1') }}"
  when: rocm_required_normalized is not defined

- name: Initialize ROCm version acceptability
  set_fact:
    rocm_version_acceptable: false

- name: Set instinct ROCm version acceptability (7.2.x patch >= min)
  set_fact:
    rocm_version_acceptable: true
  when:
    - gpu_stack_family_resolved | default('instinct') != 'radeon'
    - rocm_version_normalized is defined
    - rocm_version_normalized.split('.') | length >= 3
    - rocm_version_normalized.split('.')[0] == '7'
    - rocm_version_normalized.split('.')[1] == '2'
    - (rocm_version_normalized.split('.')[2] | int) >= (rocm_instinct_min_patch | default(3) | int)

- name: Set radeon ROCm version acceptability (required train, patch >= min)
  set_fact:
    rocm_version_acceptable: true
  when:
    - gpu_stack_family_resolved | default('instinct') == 'radeon'
    - rocm_version_normalized is defined
    - rocm_required_normalized is defined
    - rocm_version_normalized.split('.') | length >= 3
    - rocm_required_normalized.split('.') | length >= 3
    - rocm_version_normalized.split('.')[0] == rocm_required_normalized.split('.')[0]
    - rocm_version_normalized.split('.')[1] == rocm_required_normalized.split('.')[1]
    - (rocm_version_normalized.split('.')[2] | int) >= (rocm_required_normalized.split('.')[2] | int)

- name: Decide if ROCm install is needed
  set_fact:
    rocm_needs_install: "{{ not (rocm_tools_present | bool or (rocm_version is defined and rocm_version | trim != '' and rocm_version_acceptable | bool)) }}"

# Prompt before proceeding when the ROCm already installed on the node is not a
# supported version for the selected GPU_STACK_FAMILY, BEFORE doing any GPU work.
# This is the earliest point the installed ROCm version is known (the family/
# required-version pinning itself is validated earlier in Go config).
#
# It covers both families, because rocm_needs_install is forced false whenever
# any ROCm tooling is present — so without this guard an unacceptable install
# (e.g. instinct on ROCm 7.13, or radeon on ROCm 7.2) is silently kept and the
# only signal is a debug warning at the very end, far too late. Ask up front and
# default to aborting unless the operator explicitly types 'y'/'Y'.
- name: Warn and confirm before continuing on unsupported ROCm version
  pause:
    prompt: |
      ████████████████████████████████████████████████████████████████
      ⚠️  Unsupported ROCm version for GPU_STACK_FAMILY={{ gpu_stack_family_resolved | default('instinct') }}
      ████████████████████████████████████████████████████████████████

      This node has ROCm {{ rocm_version }} installed, which is NOT a supported
      version for the '{{ gpu_stack_family_resolved | default('instinct') }}' GPU stack:
      {% if gpu_stack_family_resolved | default('instinct') == 'radeon' %}
        radeon requires host ROCm on the {{ rocm_required_normalized | default('7.13') }} train (>= {{ rocm_required_version }}).
        The 7.13 tech-preview GPU Operator ({{ gpu_operator_path | default('amd-gpu-operator/v1.5.1-beta.0') }}) and
        DeviceConfig (ROCm {{ gpu_deviceconfig_driver_version | default('7.13') }}) are NOT compatible with ROCm 7.2 or older.
      {% else %}
        instinct requires host ROCm on the 7.2 train (>= 7.2.{{ rocm_instinct_min_patch | default(3) }}, e.g. 7.2.3 or 7.2.4).
      {% endif %}
      Continuing will deploy a mismatched, likely-unsupported stack. The safe fix is
      to install the ROCm version ClusterBloom expects and re-run (it installs
      ROCm {{ rocm_required_version }} automatically for this family):
        sudo amdgpu-uninstall
        sudo apt remove --purge amdgpu-install
        sudo rm -f /etc/apt/sources.list.d/rocm.list
        # then re-run ClusterBloom
      ████████████████████████████████████████████████████████████████
      Continue anyway with the currently installed ROCm? [y/N]
  register: rocm_mismatch_confirm
  when:
    # Only prompt for a real, functional install (amd-smi/rocm-smi present). A
    # stale directory-only remnant with no working tools is left to the normal
    # install path, which lays down the correct version.
    - rocm_tools_present | bool
    - rocm_version is defined
    - rocm_version | trim != ''
    - not (rocm_version_acceptable | bool)

- name: Abort unless the operator confirmed continuing on unsupported ROCm version
  fail:
    msg: >-
      Aborting: ROCm {{ rocm_version }} is not supported for
      GPU_STACK_FAMILY={{ gpu_stack_family_resolved | default('instinct') }} and continuing
      was not confirmed (must answer 'y' or 'Y'). Install the expected ROCm and re-run.
  when:
    - rocm_tools_present | bool
    - rocm_version is defined
    - rocm_version | trim != ''
    - not (rocm_version_acceptable | bool)
    - (rocm_mismatch_confirm.user_input | default('') | trim | lower) != 'y'

- name: Get Ubuntu codename
  shell: grep VERSION_CODENAME /etc/os-release | cut -d= -f2
  register: ubuntu_codename
  changed_when: false
  when: rocm_needs_install | bool

- name: Get kernel version
  shell: uname -r
  register: kernel_version
  changed_when: false
  when: rocm_needs_install | bool

- name: Install kernel headers and modules
  apt:
    name:
      - "linux-headers-{{ kernel_version.stdout }}"
      - "linux-modules-extra-{{ kernel_version.stdout }}"
      - python3-setuptools
      - python3-wheel
    state: present
  when: rocm_needs_install | bool
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
    NEEDRESTART_SUSPEND: "1"

- name: Download amdgpu-install package
  get_url:
    url: "{{ rocm_base_url }}/{{ ubuntu_codename.stdout }}/{{ rocm_deb_package }}"
    dest: "/tmp/{{ rocm_deb_package }}"
    mode: "0644"
  when: rocm_needs_install | bool

- name: Install amdgpu-install package
  apt:
    deb: "/tmp/{{ rocm_deb_package }}"
    state: present
  when: rocm_needs_install | bool
  environment:
    DEBIAN_FRONTEND: noninteractive

# The amdgpu-install .deb is named after the ROCm release (e.g. 7.2.3) but its
# internal package version tracks the amdgpu driver (e.g. 30.30.3). If the node
# already has that amdgpu-install version (common on pre-provisioned GPU images),
# the apt task above is a no-op and never (re)lays the repo conffiles. When
# /etc/apt/sources.list.d/rocm.list is missing, `amdgpu-install --usecase=rocm`
# has no ROCm apt repo and fails with "Unable to locate package rocm".
# Force dpkg to restore any deleted conffiles so both amdgpu.list and rocm.list
# are guaranteed present before we resolve the rocm metapackage.
- name: Ensure amdgpu-install repo lists are present (restore missing conffiles)
  shell: dpkg -i --force-confmiss "/tmp/{{ rocm_deb_package }}"
  when: rocm_needs_install | bool
  changed_when: false
  environment:
    DEBIAN_FRONTEND: noninteractive

# Ubuntu's universe repo ships stale ROCm packages (e.g. rocminfo 5.7.1-3build1).
# These break `rocm`'s exact-version dependency chain
# (e.g. "rocminfo (= 1.0.0.70203-...) but 5.7.1-3build1 is to be installed").
# amdgpu-install ships /etc/apt/preferences.d/repo-radeon-pin-600, but a
# priority-600 pin is not enough: apt only downgrades an already-installed
# package from a 500..999 pin when the pinned version is NEWER, and Ubuntu's
# 5.7.1 sorts newer than the ROCm repo's 1.0.0.70203. A priority > 1000 forces
# the downgrade so the repo.radeon.com builds always win. We also remove the
# vendor 600 pin: APT applies matching preference files in alphanumeric order,
# so leaving repo-radeon-pin-600 in place would shadow our higher priority.
- name: Remove amdgpu-install's default (too-low) repo.radeon.com pin
  file:
    path: /etc/apt/preferences.d/repo-radeon-pin-600
    state: absent
  when: rocm_needs_install | bool

- name: Pin repo.radeon.com above Ubuntu-provided ROCm packages
  copy:
    dest: /etc/apt/preferences.d/00-rocm-repo-radeon-pin
    mode: "0644"
    content: |
      Package: *
      Pin: release o=repo.radeon.com
      Pin-Priority: 1001
  when: rocm_needs_install | bool

- name: Verify ROCm apt repository is configured
  shell: |
    set -e
    grep -Rqs 'repo.radeon.com/rocm/apt' /etc/apt/sources.list.d/rocm.list
  register: rocm_repo_present
  changed_when: false
  failed_when: false
  when: rocm_needs_install | bool

- name: Fail early if ROCm apt repository is still missing
  fail:
    msg: |
      The ROCm apt repository (/etc/apt/sources.list.d/rocm.list) is missing even
      after reinstalling {{ rocm_deb_package }}. `amdgpu-install --usecase=rocm`
      cannot locate the `rocm` package without it. Inspect the amdgpu-install
      package state on this node:
        dpkg -l amdgpu-install
        ls -l /etc/apt/sources.list.d/
      then purge and reinstall it:
        sudo apt-get purge -y amdgpu-install && sudo rm -f /etc/apt/sources.list.d/rocm.list
        sudo apt-get install -y /tmp/{{ rocm_deb_package }}
  when:
    - rocm_needs_install | bool
    - rocm_repo_present.rc != 0

# --allow-downgrades is required because pre-provisioned nodes may already carry
# newer-versioned Ubuntu ROCm packages (e.g. rocminfo 5.7.1); the pinned
# repo.radeon.com builds (e.g. 1.0.0.70203) are lower version numbers, so apt
# treats switching to them as a downgrade and refuses under -y without this flag.
# amdgpu-install passes unrecognized args straight through to apt-get.
- name: Install ROCm
  shell: amdgpu-install --usecase=rocm,dkms --yes --allow-downgrades
  when: rocm_needs_install | bool
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Load amdgpu module
  modprobe:
    name: amdgpu
    state: present

# The tool-presence facts above were computed before the (possible) install, so
# on a freshly installed node amd-smi would not yet have been found. Re-resolve
# the SMI tooling now so verification reflects the post-install state.
- name: Re-locate amd-smi binary after install (ROCm 7.x)
  shell: |
    set -e
    for c in "$(command -v amd-smi 2>/dev/null)" \
             "{{ rocm_root }}/bin/amd-smi" \
             /opt/rocm/bin/amd-smi \
             $(ls -d /opt/rocm-*/bin/amd-smi 2>/dev/null | sort -V -r); do
      if [ -n "$c" ] && [ -x "$c" ]; then
        echo "$c"
        exit 0
      fi
    done
    exit 1
  register: amd_smi_locate
  changed_when: false
  failed_when: false

- name: Re-locate rocm-smi binary after install (legacy fallback)
  shell: |
    set -e
    for c in "$(command -v rocm-smi 2>/dev/null)" \
             "{{ rocm_root }}/bin/rocm-smi" \
             /opt/rocm/bin/rocm-smi \
             $(ls -d /opt/rocm-*/bin/rocm-smi 2>/dev/null | sort -V -r); do
      if [ -n "$c" ] && [ -x "$c" ]; then
        echo "$c"
        exit 0
      fi
    done
    exit 1
  register: rocm_smi_locate
  changed_when: false
  failed_when: false

- name: Refresh ROCm tool presence after install
  set_fact:
    amd_smi_bin: "{{ amd_smi_locate.stdout | trim }}"
    rocm_smi_bin: "{{ rocm_smi_locate.stdout | trim }}"
    amd_smi_present: "{{ amd_smi_locate.rc == 0 and (amd_smi_locate.stdout | trim) != '' }}"
    rocm_smi_present: "{{ rocm_smi_locate.rc == 0 and (rocm_smi_locate.stdout | trim) != '' }}"

- name: Verify GPUs with amd-smi (ROCm 7.x)
  shell: "{{ amd_smi_bin }} list --json | jq -r '.[] | \"GPU \\(.gpu) \\(.bdf)\"'"
  register: amd_smi_output
  changed_when: false
  when: amd_smi_present | bool
  failed_when: false

- name: Verify GPUs with rocm-smi (fallback)
  shell: "{{ rocm_smi_bin }} -i --json | jq -r '.[] | .[\"Device Name\"]' | sort | uniq -c"
  register: rocm_smi_output
  changed_when: false
  when: not amd_smi_present | bool and rocm_smi_present | bool
  failed_when: false

- name: Display detected GPUs (amd-smi)
  debug:
    msg: "ROCm Devices:\n{{ amd_smi_output.stdout }}"
  when: amd_smi_present | bool

- name: Display detected GPUs (rocm-smi)
  debug:
    msg: "ROCm Devices:\n{{ rocm_smi_output.stdout }}"
  when: not amd_smi_present | bool and rocm_smi_present | bool

- name: Validate GPU detection (amd-smi)
  fail:
    msg: "No GPUs detected by amd-smi ({{ amd_smi_bin }})"
  when:
    - amd_smi_present | bool
    - amd_smi_output.stdout == "" or amd_smi_output.rc != 0

- name: Validate GPU detection (rocm-smi)
  fail:
    msg: "No GPUs detected by rocm-smi ({{ rocm_smi_bin }})"
  when:
    - not amd_smi_present | bool
    - rocm_smi_present | bool
    - rocm_smi_output.stdout == ""

# Guard against the confusing "No GPUs detected by rocm-smi" failure on ROCm 7.x
# nodes where rocm-smi does not exist: if neither tool resolved, the ROCm install
# is incomplete rather than the GPUs being absent.
- name: Fail if no ROCm SMI tooling could be located
  fail:
    msg: |
      Could not locate amd-smi or rocm-smi on this node, so GPU presence cannot be
      verified. This usually means the ROCm install is incomplete or /opt/rocm is a
      stale/incomplete tree shadowing the real versioned install. Checked PATH,
      {{ rocm_root }}/bin, /opt/rocm/bin and /opt/rocm-*/bin.
  when:
    - not amd_smi_present | bool
    - not rocm_smi_present | bool

- name: Display ROCm version
  debug:
    msg: "ROCm version: {{ rocm_version }}"

- name: Warn if ROCm version is not acceptable for {{ gpu_stack_family_resolved | default('instinct') }}
  debug:
    msg: |
      ████████████████████████████████████████████████████████████████
      ⚠️  WARNING: ROCm version mismatch detected!
      ████████████████████████████████████████████████████████████████

      Installed : ROCm {{ rocm_version }}
      Required  : ROCm {{ rocm_required_version }}

      {% if gpu_stack_family_resolved | default('instinct') == 'radeon' %}
      ClusterBloom requires ROCm {{ rocm_required_normalized | default(rocm_required_version) }} or newer on the {{ rocm_required_normalized.split('.')[0] }}.{{ rocm_required_normalized.split('.')[1] }} train for radeon.
      {% else %}
      ClusterBloom requires ROCm 7.2.{{ rocm_instinct_min_patch | default(3) }} or newer on the 7.2 train for instinct.
      {% endif %}
      Using a different version may result in compatibility issues,
      unexpected behavior, or unsupported features.

      To install the correct version:
        1. sudo amdgpu-uninstall
        2. sudo apt remove --purge amdgpu-install
        3. Re-run ClusterBloom (installs ROCm {{ rocm_required_version }} automatically)
           OR manually:
             CODENAME=$(grep VERSION_CODENAME /etc/os-release | cut -d= -f2)
             wget {{ rocm_base_url }}/$CODENAME/{{ rocm_deb_package }}
             sudo apt install -y ./{{ rocm_deb_package }}
             sudo amdgpu-install --usecase=rocm,dkms --yes
        4. sudo reboot

      ████████████████████████████████████████████████████████████████
  when: rocm_version is defined and rocm_version | trim != "" and not (rocm_version_acceptable | bool)

- name: Confirm ROCm version matches requirement
  debug:
    msg: "✅ ROCm {{ rocm_version }} confirmed — acceptable for {{ gpu_stack_family_resolved | default('instinct') }} stack"
  when: rocm_version_acceptable | bool
