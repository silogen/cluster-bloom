---
# Purpose: Deploys ClusterForge platform
# Dependencies: CLUSTERFORGE_REPO, CLUSTERFORGE_RELEASE, DOMAIN variables
# Usage: Imported by main cluster-bloom.yaml playbook
# Tags: [deploy_clusterforge]

- name: Build DISABLED_APPS from AIWB_ONLY flag
  set_fact:
    DISABLED_APPS: >-
      {%- set aiwb_disabled = 'airm,airm-infra-cnpg,airm-infra-external-secrets,airm-infra-rabbitmq,kaiwo*,rabbitmq' -%}
      {%- if DISABLED_APPS | default('') | length > 0 -%}
        {{ aiwb_disabled }},{{ DISABLED_APPS }}
      {%- else -%}
        {{ aiwb_disabled }}
      {%- endif -%}
  when: AIWB_ONLY | default(false) | bool
  tags: [clusterforge, argocd, deploy_clusterforge, deploy_k8s_apps]

- name: Parse ClusterForge Version
  include_tasks: parse_version.yaml
  when: FIRST_NODE and CLUSTERFORGE_RELEASE != "none" and CLUSTERFORGE_RELEASE != ""
  tags: [clusterforge, argocd, deploy_clusterforge, deploy_k8s_apps]

# CLUSTERFORGE_RELEASE "none"/"" means ArgoCD only, no ClusterForge. The
# standalone ArgoCD core install in deploy_k8s_apps/argocd.yaml handles that
# case. ClusterForge itself is deployed only via clusterforge_setup.yaml below.
- name: Setup ClusterForge
  include_tasks: clusterforge_setup.yaml
  when: FIRST_NODE and CLUSTERFORGE_RELEASE != "none" and CLUSTERFORGE_RELEASE != ""
  tags: [clusterforge, deploy_clusterforge]