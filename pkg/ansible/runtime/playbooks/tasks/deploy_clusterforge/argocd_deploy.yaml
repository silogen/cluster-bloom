---
# Purpose: Deploy ClusterForge via ArgoCD for small clusters
# Dependencies: CLUSTER_SIZE, INSTALL_ARGOCD, DOMAIN, clusterforge_version variables
# Usage: Imported by deploy_clusterforge/main.yaml (conditional on small clusters)
# Tags: [clusterforge, argocd, deploy_clusterforge]

- name: Clone ClusterForge chart
  shell: |
    rm -rf /tmp/cluster-forge
    git clone --branch {{ clusterforge_version }} --depth 1 {{ CLUSTERFORGE_REPO }} /tmp/cluster-forge

- name: Build AIM hardware family list (JSON array)
  set_fact:
    aim_hardware_families_json: "{{ AIM_HARDWARE_FAMILY | default('') | split(',') | map('trim') | reject('equalto', '') | list | to_json }}"

- name: Template and apply ClusterForge
  shell: |
    /usr/local/bin/helm template cluster-forge /tmp/cluster-forge/root \
      -f /tmp/cluster-forge/root/values.yaml \
      -f /tmp/cluster-forge/root/values_{{ CLUSTER_SIZE }}.yaml \
      --set global.domain={{ DOMAIN }} \
      --set clusterForge.targetRevision={{ clusterforge_version }} \
      --set-json 'apps.aim-cluster-model-source.valuesObject.hardwareFamilies={{ aim_hardware_families_json }}' \
      --set 'apps.amd-gpu-operator.path={{ gpu_operator_path }}' \
      --set 'apps.amd-gpu-operator-config.path={{ gpu_operator_config_path }}' \
      --set 'apps.amd-gpu-operator-config.valuesObject.gpuStackFamily={{ gpu_stack_family_resolved }}' \
      --set 'apps.amd-gpu-operator-config.valuesObject.driverVersion={{ gpu_deviceconfig_driver_version }}' | \
    /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml \
      apply --server-side --force-conflicts -f -

- name: Clean up ClusterForge checkout
  file:
    path: /tmp/cluster-forge
    state: absent