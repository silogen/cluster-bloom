---
# Purpose: Update AIRM cluster records with new domain URLs
# Dependencies: NEW_DOMAIN, DRY_RUN variables
# Usage: Imported by update_config.yaml

- name: Update AIRM cluster records
  block:
    - name: Display dry-run message for AIRM clusters
      debug:
        msg: "🔧 [DRY RUN] Would update AIRM cluster records"
      when: DRY_RUN

    - name: Update AIRM clusters in cluster
      when: not DRY_RUN
      block:
        - name: Display AIRM cluster update header
          debug:
            msg: "🔧 Updating AIRM cluster records..."

        - name: Get AIRM Keycloak credentials from secrets
          shell: |
            # Get UI client secret from airm-keycloak-ui-creds in airm namespace
            UI_CLIENT_SECRET=$(/var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get secret airm-keycloak-ui-creds -n airm -o jsonpath='{.data.KEYCLOAK_SECRET}' 2>/dev/null | base64 -d || echo "")

            # Get user password from airm-user-credentials in airm namespace
            USER_PASSWORD=$(/var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get secret airm-user-credentials -n airm -o jsonpath='{.data.USER_PASSWORD}' 2>/dev/null | base64 -d || echo "")

            # Get admin client credentials from airm-realm-credentials in keycloak namespace
            ADMIN_CLIENT_ID=$(/var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get secret airm-realm-credentials -n keycloak -o jsonpath='{.data.ADMIN_CLIENT_ID}' 2>/dev/null | base64 -d || echo "")
            ADMIN_CLIENT_SECRET=$(/var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get secret airm-realm-credentials -n keycloak -o jsonpath='{.data.ADMIN_CLIENT_SECRET}' 2>/dev/null | base64 -d || echo "")

            echo "${UI_CLIENT_SECRET}|${USER_PASSWORD}|${ADMIN_CLIENT_ID}|${ADMIN_CLIENT_SECRET}"
          register: airm_keycloak_creds_result
          changed_when: false
          no_log: true

        - name: Parse AIRM Keycloak credentials
          set_fact:
            airm_ui_client_secret: "{{ airm_keycloak_creds_result.stdout.split('|')[0] }}"
            airm_user_password: "{{ airm_keycloak_creds_result.stdout.split('|')[1] }}"
            airm_admin_client_id: "{{ airm_keycloak_creds_result.stdout.split('|')[2] }}"
            airm_admin_client_secret: "{{ airm_keycloak_creds_result.stdout.split('|')[3] }}"
          no_log: true

        - name: Create ConfigMap with AIRM cluster update script
          shell: |
            cat <<'EOF' | /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml apply -f -
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: airm-cluster-domain-update
              namespace: default
            data:
              update-clusters.sh: |
                #!/bin/bash
                set -e

                KC_URL="http://keycloak.keycloak.svc:8080"
                AIRM_API_URL="http://airm-api.airm.svc:80"
                NEW_DOMAIN="{{ NEW_DOMAIN }}"
                UI_CLIENT_ID="354a0fa1-35ac-4a6d-9c4d-d661129c2cd0"
                UI_CLIENT_SECRET="{{ airm_ui_client_secret }}"
                USER_PASSWORD="{{ airm_user_password }}"
                ADMIN_CLIENT_ID="{{ airm_admin_client_id }}"
                ADMIN_CLIENT_SECRET="{{ airm_admin_client_secret }}"

                # Get admin token to query Keycloak for actual devuser username
                echo "Getting Keycloak admin token..."
                ADMIN_TOKEN=$(curl -s -X POST "${KC_URL}/realms/airm/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=client_credentials" \
                  -d "client_id=${ADMIN_CLIENT_ID}" \
                  -d "client_secret=${ADMIN_CLIENT_SECRET}" | jq -r '.access_token')

                if [ "$ADMIN_TOKEN" = "null" ] || [ -z "$ADMIN_TOKEN" ]; then
                  echo "Failed to get admin token for user query"
                  exit 1
                fi

                echo "Admin token obtained successfully"

                # Get devuser by hardcoded ID (defined in keycloak realm template)
                echo "Retrieving devuser from Keycloak..."
                DEVUSER_ID="487590ed-165c-44d5-b686-1aff81cca298"
                DEVUSER_USERNAME=$(curl -s -X GET \
                  "${KC_URL}/admin/realms/airm/users/${DEVUSER_ID}" \
                  -H "Authorization: Bearer ${ADMIN_TOKEN}" | \
                  jq -r '.username // empty')

                if [ -z "$DEVUSER_USERNAME" ]; then
                  echo "Failed to retrieve devuser (ID: ${DEVUSER_ID})"
                  exit 1
                fi

                echo "Found devuser: ${DEVUSER_USERNAME}"

                # Get access token for AIRM API using password grant with actual username
                echo "Getting Keycloak access token for AIRM API..."
                ACCESS_TOKEN=$(curl -s -X POST "${KC_URL}/realms/airm/protocol/openid-connect/token" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "grant_type=password" \
                  -d "client_id=${UI_CLIENT_ID}" \
                  -d "client_secret=${UI_CLIENT_SECRET}" \
                  -d "username=${DEVUSER_USERNAME}" \
                  -d "password=${USER_PASSWORD}" | jq -r '.access_token')

                if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
                  echo "Failed to get access token for AIRM API"
                  exit 1
                fi

                echo "Access token obtained successfully"

                # Fetch all clusters
                echo "Fetching clusters from AIRM API..."
                CLUSTERS=$(curl -s -X GET "${AIRM_API_URL}/v1/clusters" \
                  -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                  -H "Content-Type: application/json")

                # Check if we got valid JSON
                if ! echo "$CLUSTERS" | jq -e . >/dev/null 2>&1; then
                  echo "Failed to fetch clusters or invalid JSON response"
                  exit 1
                fi

                # Extract cluster IDs
                CLUSTER_IDS=$(echo "$CLUSTERS" | jq -r '.data[]? | .id // empty')

                if [ -z "$CLUSTER_IDS" ]; then
                  echo "No clusters found or unable to parse cluster IDs"
                  echo "Response: $CLUSTERS"
                  exit 0
                fi

                echo "Found clusters: $(echo "$CLUSTER_IDS" | wc -l)"

                # Update each cluster
                for CLUSTER_ID in $CLUSTER_IDS; do
                  echo "Updating cluster: ${CLUSTER_ID}..."

                  # Update the URLs
                  CLUSTER_PATCH=$(echo "{}" | jq \
                    --arg kube_url "https://k8s.${NEW_DOMAIN}" \
                    --arg workbench_url "https://aiwbui.${NEW_DOMAIN}" \
                    '.kubeApiUrl = $kube_url | .workbenchBaseUrl = $workbench_url')

                  # Send PUT request
                  UPDATE_RESPONSE=$(curl -s -X PUT "${AIRM_API_URL}/v1/clusters/${CLUSTER_ID}" \
                    -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "$CLUSTER_PATCH")

                  if echo "$UPDATE_RESPONSE" | jq -e . >/dev/null 2>&1; then
                    echo "  ✓ Updated cluster ${CLUSTER_ID}"
                  else
                    echo "  ⚠️  Failed to update cluster ${CLUSTER_ID}"
                    echo "  Response: $UPDATE_RESPONSE"
                  fi
                done

                echo "All AIRM clusters updated successfully"
            EOF
          changed_when: true
          no_log: true

        - name: Create Job to update AIRM clusters
          shell: |
            cat <<'EOF' | /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml apply -f -
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: airm-cluster-domain-update
              namespace: default
            spec:
              ttlSecondsAfterFinished: 300
              template:
                spec:
                  restartPolicy: Never
                  containers:
                  - name: update-airm-clusters
                    image: amdenterpriseai/cluster-tool:latest
                    command: ["/bin/bash", "/scripts/update-clusters.sh"]
                    volumeMounts:
                    - name: script
                      mountPath: /scripts
                  volumes:
                  - name: script
                    configMap:
                      name: airm-cluster-domain-update
                      defaultMode: 0755
            EOF
          changed_when: true

        - name: Wait for AIRM cluster update job to complete
          command: /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml wait --for=condition=complete --timeout=60s job/airm-cluster-domain-update -n default
          register: job_wait
          changed_when: false
          failed_when: false

        - name: Get job logs
          command: /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml logs job/airm-cluster-domain-update -n default
          register: job_logs
          changed_when: false
          failed_when: false

        - name: Display job logs
          debug:
            msg: "{{ job_logs.stdout_lines }}"
          when: job_logs.stdout_lines is defined

        - name: Check job status
          fail:
            msg: "AIRM cluster update job failed. Check logs above."
          when: job_wait.rc != 0

        - name: Display AIRM cluster update result
          debug:
            msg: "  ✅ AIRM cluster records updated"
