---
# Purpose: Prepare system for RKE2 cluster deployment (kernel modules, config, directories)
# Dependencies: node_ip, DOMAIN, FIX_DNS, DNS_SERVERS variables
# Usage: Imported by deploy_cluster/main.yaml 
# Tags: [deploy_cluster]

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - iscsi_tcp
    - dm_mod

- name: Ensure kernel modules load on boot
  lineinfile:
    path: /etc/modules-load.d/rke2.conf
    line: "{{ item }}"
    create: yes
  loop:
    - iscsi_tcp
    - dm_mod

- name: Create RKE2 config directory
  file:
    path: /etc/rancher/rke2
    state: directory
    mode: "0755"

- name: Configure DNS for RKE2 cluster
  block:
    - name: Create custom DNS configuration from DNS_SERVERS variable
      copy:
        content: |
          # Generated by cluster-bloom from DNS_SERVERS variable
          {% for dns_server in DNS_SERVERS %}
          nameserver {{ dns_server }}
          {% endfor %}
        dest: /etc/rancher/rke2/resolv.conf
        mode: "0644"
      when: DNS_SERVERS | length > 0

    - name: Copy DNS configuration from host (when DNS_SERVERS not set)
      shell: |
        # Determine which resolv.conf to use as source
        if grep -q "127\.0\.0\." /etc/resolv.conf; then
          if [ -f /run/systemd/resolve/resolv.conf ]; then
            # Use systemd-resolved upstream configuration
            SOURCE_RESOLV="/run/systemd/resolve/resolv.conf"
            echo "# Generated by cluster-bloom from systemd-resolved upstream config" > /etc/rancher/rke2/resolv.conf
            grep -v '^search ' "$SOURCE_RESOLV" | grep -E '^(nameserver|options)' >> /etc/rancher/rke2/resolv.conf
          else
            # Fallback to public DNS servers when systemd-resolved config not available
            echo "# Generated by cluster-bloom using fallback DNS servers" > /etc/rancher/rke2/resolv.conf
            echo "nameserver 1.1.1.1" >> /etc/rancher/rke2/resolv.conf
            echo "nameserver 8.8.8.8" >> /etc/rancher/rke2/resolv.conf
            echo "nameserver 8.8.4.4" >> /etc/rancher/rke2/resolv.conf
          fi
        else
          # Use regular resolv.conf, filtering out search domains
          SOURCE_RESOLV="/etc/resolv.conf"
          echo "# Generated by cluster-bloom from host resolv.conf" > /etc/rancher/rke2/resolv.conf
          grep -v '^search ' "$SOURCE_RESOLV" | grep -E '^(nameserver|options)' >> /etc/rancher/rke2/resolv.conf
        fi
        
        chmod 644 /etc/rancher/rke2/resolv.conf
      when: DNS_SERVERS | length == 0

- name: Create audit policy
  copy:
    content: |
      apiVersion: audit.k8s.io/v1
      kind: Policy
      metadata:
        creationTimestamp: null
      rules:
      - level: Metadata
    dest: /etc/rancher/rke2/audit-policy.yaml
    mode: "0644"

- name: Validate CLUSTER_LISTEN_IP configuration
  when: CLUSTER_LISTEN_IP is defined and CLUSTER_LISTEN_IP != ""
  block:
    - name: Gather network interface facts
      setup:
        filter: ansible_all_ipv4_addresses

    - name: Validate explicit IP exists on system interfaces
      fail:
        msg: |
          ❌ CLUSTER_LISTEN_IP validation failed!
          
          Specified IP: {{ CLUSTER_LISTEN_IP }}
          Available IPs on this system: {{ ansible_all_ipv4_addresses | join(', ') }}
          
          📋 To fix this issue:
          1. Choose an IP from the available list above, or
          2. Use a CIDR subnet that contains available IPs (e.g., "192.168.1.0/24")
          
          💡 Tip: Run 'ip addr show' on the target system to see all interfaces
      when:
        - CLUSTER_LISTEN_IP is string
        - "'/' not in CLUSTER_LISTEN_IP"
        - CLUSTER_LISTEN_IP not in ansible_all_ipv4_addresses

    - name: Check subnet contains any system IPs using native logic
      shell: |
        subnet="{{ CLUSTER_LISTEN_IP }}"
        network=$(echo "$subnet" | cut -d'/' -f1)
        prefix=$(echo "$subnet" | cut -d'/' -f2)
        
        # Convert network to integer
        network_int=$(echo "$network" | awk -F. '{print ($1 * 16777216) + ($2 * 65536) + ($3 * 256) + $4}')
        
        # Calculate subnet mask
        mask=$((0xffffffff << (32 - prefix) & 0xffffffff))
        network_masked=$((network_int & mask))
        
        matching_ips=""
        for ip in {{ ansible_all_ipv4_addresses | join(' ') }}; do
          # Convert IP to integer
          ip_int=$(echo "$ip" | awk -F. '{print ($1 * 16777216) + ($2 * 65536) + ($3 * 256) + $4}')
          ip_masked=$((ip_int & mask))
          
          # Check if IP is in the same network
          if [ "$ip_masked" -eq "$network_masked" ]; then
            matching_ips="$matching_ips $ip"
          fi
        done
        
        echo "${matching_ips## }"
      register: subnet_check_result
      changed_when: false
      when:
        - CLUSTER_LISTEN_IP is string
        - "'/' in CLUSTER_LISTEN_IP"

    - name: Set subnet matching IPs fact
      set_fact:
        subnet_matching_ips: "{{ subnet_check_result.stdout.split() if subnet_check_result.stdout else [] }}"
      when:
        - CLUSTER_LISTEN_IP is string
        - "'/' in CLUSTER_LISTEN_IP"
        - subnet_check_result is defined

    - name: Fail if CIDR subnet contains no system IPs
      fail:
        msg: |
          ❌ CLUSTER_LISTEN_IP subnet validation failed!
          
          Specified subnet: {{ CLUSTER_LISTEN_IP }}
          Available IPs on system: {{ ansible_all_ipv4_addresses | join(', ') }}
          IPs matching subnet: {{ subnet_matching_ips | join(', ') if subnet_matching_ips else 'None' }}
          
          📋 To fix this issue:
          1. Choose a different CIDR that contains system IPs, or
          2. Use an explicit IP from the available list above
          
          💡 Example: If system has "192.168.1.100", use "192.168.1.0/24"
      when:
        - CLUSTER_LISTEN_IP is string
        - "'/' in CLUSTER_LISTEN_IP"
        - subnet_matching_ips is defined
        - subnet_matching_ips | length == 0

    - name: Display IP validation results
      debug:
        msg: |
          ✅ CLUSTER_LISTEN_IP validation passed!
          Configuration: {{ CLUSTER_LISTEN_IP }}
          {% if CLUSTER_LISTEN_IP is string and '/' not in CLUSTER_LISTEN_IP %}
          Type: Explicit IP address
          {% elif CLUSTER_LISTEN_IP is string and '/' in CLUSTER_LISTEN_IP %}
          Type: CIDR subnet
          Available IPs in subnet: {{ subnet_matching_ips | default([]) | join(', ') or 'None' }}
          {% endif %}

- name: Determine node IP for RKE2 cluster communication
  block:
    # Priority 1: Use explicit IP if provided
    - name: Use explicit CLUSTER_LISTEN_IP if provided
      set_fact:
        node_ip: "{{ CLUSTER_LISTEN_IP }}"
      when: 
        - CLUSTER_LISTEN_IP is defined
        - CLUSTER_LISTEN_IP != ""
        - "'/' not in CLUSTER_LISTEN_IP"
        - CLUSTER_LISTEN_IP is string

    # Priority 2: Find IP from CIDR subnet if provided
    - name: Find IP from CLUSTER_LISTEN_IP subnet
      set_fact:
        node_ip: "{{ subnet_matching_ips[0] }}"
      when:
        - node_ip is not defined
        - CLUSTER_LISTEN_IP is defined
        - CLUSTER_LISTEN_IP != ""
        - "'/' in CLUSTER_LISTEN_IP"
        - CLUSTER_LISTEN_IP is string
        - subnet_matching_ips is defined
        - subnet_matching_ips | length > 0

    # Priority 3: Use default route interface (auto-detection)
    - name: Use default route interface for cluster communication
      set_fact:
        node_ip: "{{ ansible_default_ipv4.address }}"
      when: node_ip is not defined

- name: Display selected cluster IP for verification
  debug:
    msg: |
       🌐 Cluster IP Selection Result:
       Selected IP: {{ node_ip }}
       {% if CLUSTER_LISTEN_IP is defined and CLUSTER_LISTEN_IP != "" %}
       Configuration: CLUSTER_LISTEN_IP = {{ CLUSTER_LISTEN_IP }}
       Validation: ✅ Passed (IP/subnet verified on target system)
        {% if CLUSTER_LISTEN_IP is string and '/' not in CLUSTER_LISTEN_IP %}
        Method: Explicit IP address specified
        {% elif CLUSTER_LISTEN_IP is string and '/' in CLUSTER_LISTEN_IP %}
        Method: First IP found from subnet {{ CLUSTER_LISTEN_IP }}
        {% endif %}
       {% else %}
       Method: Auto-detection (default route interface)
       Configuration: No CLUSTER_LISTEN_IP specified, using default route interface
       Interface: {{ ansible_default_ipv4.interface }}
       Gateway: {{ ansible_default_ipv4.gateway }}
       Validation: ⏭️ Skipped (backward compatibility mode)
       {% endif %}

- name: Create RKE2 config.yaml
  copy:
    content: |
      cni: cilium
      cluster-cidr: 10.242.0.0/16
      service-cidr: 10.243.0.0/16
      node-ip: {{ node_ip }}

      disable: rke2-ingress-nginx
      audit-log-path: "/var/lib/rancher/rke2/server/logs/kube-apiserver-audit.log"
      audit-log-maxage: 30
      audit-log-maxbackup: 10
      audit-log-maxsize: 100
      audit-policy-file: "/etc/rancher/rke2/audit-policy.yaml"
      resolv-conf: "/etc/rancher/rke2/resolv.conf"
    dest: /etc/rancher/rke2/config.yaml
    mode: "0644"

- name: Append extra RKE2 config
  blockinfile:
    path: /etc/rancher/rke2/config.yaml
    block: "{{ RKE2_EXTRA_CONFIG }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - extra config"
  when: RKE2_EXTRA_CONFIG != ""