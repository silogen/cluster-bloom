- name: Handle OIDC authentication configuration
  when: DOMAIN != "" or ADDITIONAL_OIDC_PROVIDERS | length > 0
  block:
    - name: Initialize OIDC providers list
      set_fact:
        oidc_providers_list: []

    - name: Add default OIDC provider (auto-configured from DOMAIN)
      set_fact:
        oidc_providers_list: "{{ oidc_providers_list + [{'url': 'https://kc.' + DOMAIN + '/realms/airm', 'audiences': ['k8s']}] }}"
      when: DOMAIN != ""

    - name: Add additional OIDC providers
      set_fact:
        oidc_providers_list: "{{ oidc_providers_list + [provider] }}"
      loop: "{{ ADDITIONAL_OIDC_PROVIDERS }}"
      loop_control:
        loop_var: provider
      when: 
        - ADDITIONAL_OIDC_PROVIDERS is defined
        - ADDITIONAL_OIDC_PROVIDERS | length > 0

    - name: Remove duplicate OIDC providers
      set_fact:
        unique_providers: "{{ unique_providers | default([]) + [provider] }}"
      loop: "{{ oidc_providers_list }}"
      loop_control:
        loop_var: provider
      when: provider.url not in (unique_providers | default([]) | map(attribute='url') | list)

    - name: Set final OIDC providers list
      set_fact:
        oidc_providers_list: "{{ unique_providers | default([]) }}"

    - name: Create list of additional OIDC providers (excluding default domain-based provider)
      set_fact:
        additional_providers_list: "{{ oidc_providers_list | selectattr('url', 'ne', 'https://kc.' + DOMAIN + '/realms/airm') | list }}"

    - name: Create OIDC authentication directory
      file:
        path: /etc/rancher/rke2/auth
        state: directory
        mode: '0755'
      when: oidc_providers_list | length > 0

    - name: Create RKE2 certificate directory for existing certificates
      file:
        path: /etc/rancher/rke2/certs
        state: directory
        mode: '0755'
      when: 
        - oidc_providers_list | length > 0
        - CERT_OPTION == "existing"

    - name: Copy existing TLS certificate to RKE2 certs directory
      copy:
        src: "{{ TLS_CERT }}"
        dest: /etc/rancher/rke2/certs/tls.crt
        mode: "0644"
        remote_src: yes
      when: 
        - oidc_providers_list | length > 0
        - CERT_OPTION == "existing"
        - TLS_CERT != ""

    - name: Copy existing TLS private key to RKE2 certs directory
      copy:
        src: "{{ TLS_KEY }}"
        dest: /etc/rancher/rke2/certs/tls.key
        mode: "0600"
        remote_src: yes
      when: 
        - oidc_providers_list | length > 0
        - CERT_OPTION == "existing"
        - TLS_KEY != ""

    - name: "Fetch certificates from additional OIDC providers ({{ additional_providers_list | map(attribute='url') | map('regex_replace', '^https?://([^/]+).*$', '\\1') | join(', ') }}) - deployment will fail if any provider is unreachable"
      shell: |
        hostname=$(echo "{{ provider.url }}" | sed 's|^https\?://\([^/]\+\).*$|\1|')
        cert_content=$(timeout 10 openssl s_client -showcerts -connect "$hostname:443" -servername "$hostname" </dev/null 2>&1 | \
        sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p')
        if [ -z "$cert_content" ]; then
          echo "ERROR: Failed to fetch certificate from OIDC provider: {{ provider.url }}" >&2
          echo "Provider $hostname is not reachable or does not have a valid certificate" >&2
          exit 1
        fi
        echo "$cert_content"
      register: oidc_provider_certs
      loop: "{{ additional_providers_list }}"
      loop_control:
        loop_var: provider
        index_var: provider_index
      when: additional_providers_list | length > 0

    - name: Debug certificate fetching results
      debug:
        msg: 
          - "Provider: {{ oidc_providers_list[cert_index].url }}"
          - "Hostname extracted: {{ oidc_providers_list[cert_index].url | regex_replace('^https?://([^/]+).*$', '\\1') }}"
          - "Command executed: {{ item.cmd }}"
          - "Status: {{ 'SUCCESS' if item.stdout else 'FAILED' }}"
          - "Certificate length: {{ item.stdout | length if item.stdout else 0 }}"
          - "Stdout preview: {{ (item.stdout[:100] + '...') if item.stdout else 'EMPTY' }}"
          - "Stderr: {{ item.stderr if item.stderr else 'None' }}"
          - "Return code: {{ item.rc }}"
      loop: "{{ oidc_provider_certs.results }}"
      loop_control:
        index_var: cert_index
      when: oidc_providers_list | length > 0

    - name: "Save additional OIDC provider certificates ({{ additional_providers_list | map(attribute='url') | map('regex_replace', '^https?://([^/]+).*$', '\\1') | join(', ') }}) → oidc-provider-add-N.crt"
      copy:
        content: "{{ item.stdout }}"
        dest: "/etc/rancher/rke2/certs/oidc-provider-add-{{ item.provider_index + 1 }}.crt"
        mode: "0644"
      loop: "{{ oidc_provider_certs.results }}"
      when: 
        - additional_providers_list | length > 0
        - item.stdout is defined
        - item.stdout != ""

    - name: Read TLS certificate content for domain-based OIDC providers
      slurp:
        src: /etc/rancher/rke2/certs/tls.crt
      register: domain_cert_content_b64
      when: 
        - oidc_providers_list | length > 0
        - CERT_OPTION in ["existing", "generate"]

    - name: "Read additional OIDC provider certificates → oidc-provider-add-N.crt ({{ additional_providers_list | length }} files)"
      slurp:
        src: "/etc/rancher/rke2/certs/oidc-provider-add-{{ provider_index + 1 }}.crt"
      register: provider_cert_contents
      loop: "{{ additional_providers_list }}"
      loop_control:
        index_var: provider_index
        loop_var: provider
      failed_when: false
      when: additional_providers_list | length > 0

    - name: "Create multi-provider OIDC authentication config ({{ oidc_providers_list | length }} providers) → auth-config.yaml"
      copy:
        dest: /etc/rancher/rke2/auth/auth-config.yaml
        mode: "0644"
        content: |
          apiVersion: apiserver.config.k8s.io/v1
          kind: AuthenticationConfiguration
          jwt:
          {% for provider in oidc_providers_list %}
          {% set provider_index = loop.index0 %}
          - issuer:
              url: {{ provider.url }}
          {% if provider.url == 'https://kc.' + DOMAIN + '/realms/airm' and domain_cert_content_b64 is defined %}
              certificateAuthority: |
          {% for line in (domain_cert_content_b64.content | b64decode).splitlines() %}
                {{ line }}
          {% endfor %}
          {% else %}
          {% for add_provider in additional_providers_list %}
          {% if add_provider.url == provider.url and provider_cert_contents.results[loop.index0] is defined and provider_cert_contents.results[loop.index0].content is defined %}
              certificateAuthority: |
          {% for line in (provider_cert_contents.results[loop.index0].content | b64decode).splitlines() %}
                {{ line }}
          {% endfor %}
          {% endif %}
          {% endfor %}
          {% endif %}
              audiences:
          {% for audience in provider.audiences %}
              - {{ audience }}
          {% endfor %}
          {% if provider.audiences | length > 1 %}
              audienceMatchPolicy: MatchAny
          {% endif %}
            claimMappings:
              username:
                claim: preferred_username
                prefix: "oidc:"
              groups:
                claim: groups
                prefix: "oidc:"
          {% endfor %}
      when: oidc_providers_list | length > 0



    - name: Configure RKE2 to use Authentication Configuration
      blockinfile:
        path: /etc/rancher/rke2/config.yaml
        block: |
          kube-apiserver-arg:
            - "--authentication-config=/etc/rancher/rke2/auth/auth-config.yaml"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - OIDC Authentication"
      when: oidc_providers_list | length > 0

    - name: Generate OIDC kubeconfig template
      copy:
        content: |
          apiVersion: v1
          kind: Config
          clusters:
          - name: {{ DOMAIN | default('cluster') }}
            cluster:
              server: https://k8s.{{ DOMAIN }}:6443
              {% if 'generate' in CERT_OPTION | default('') %}
              insecure-skip-tls-verify: true
              {% endif %}
          contexts:
          - name: oidc@{{ DOMAIN | default('cluster') }}
            context:
              cluster: {{ DOMAIN | default('cluster') }}
              user: oidc
          current-context: oidc@{{ DOMAIN | default('cluster') }}
          users:
          - name: oidc
            user:
              exec:
                apiVersion: client.authentication.k8s.io/v1beta1
                command: kubectl
                args:
                - oidc-login
                - get-token
                - --oidc-issuer-url={{ (oidc_providers_list | first).url }}
                - --oidc-client-id={{ (oidc_providers_list | first).audiences | first }}
                - --oidc-extra-scope=email,profile,groups
                - --oidc-username-claim=preferred_username
                - --oidc-groups-claim=groups
                env: null
                provideClusterInfo: false
        dest: /root/kubeconfig-oidc-template.yaml
        mode: "0644"
      when: 
        - oidc_providers_list | length > 0
        - DOMAIN != ""

    - name: Display OIDC configuration summary
      debug:
        msg: |
          === OIDC Configuration Summary ===
          Configured {{ oidc_providers_list | length }} OIDC provider(s):
          {% for provider in oidc_providers_list %}
            - {{ provider.url }} (audiences: {{ provider.audiences | join(', ') }})
          {% endfor %}
          
          Post-installation setup:
          1. OIDC kubeconfig template: /root/kubeconfig-oidc-template.yaml
          2. Install kubectl oidc-login plugin for OIDC authentication
          3. Configure OIDC provider groups as needed for your RBAC system
      when: oidc_providers_list | length > 0

- name: Create RKE2 manifests directory
  file:
    path: /var/lib/rancher/rke2/server/manifests
    state: directory
    mode: "0755"

- name: Create Cilium HelmChartConfig for cluster size optimization
  copy:
    content: |
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: rke2-cilium
        namespace: kube-system
      spec:
        valuesContent: |-
          # Cilium Operator Configuration
          operator:
            # Set replicas based on cluster size
            replicas: {{ '1' if CLUSTER_SIZE in ['small', 'medium'] else '2' }}
            
            # Resource limits appropriate for cluster size
            resources:
              limits:
                cpu: {{ '500m' if CLUSTER_SIZE in ['small', 'medium'] else '1000m' }}
                memory: {{ '512Mi' if CLUSTER_SIZE in ['small', 'medium'] else '1Gi' }}
              requests:
                cpu: {{ '50m' if CLUSTER_SIZE in ['small', 'medium'] else '100m' }}
                memory: 128Mi
          
          # Hubble observability (disabled for all cluster sizes)
          hubble:
            enabled: false
            relay:
              enabled: false
            ui:
              enabled: false
            metrics:
              enabled: []
          
          # Network policy enforcement
          policyEnforcement: "default"
          
          # IPAM configuration
          ipam:
            mode: kubernetes
    dest: /var/lib/rancher/rke2/server/manifests/rke2-cilium-config.yaml
    mode: "0644"