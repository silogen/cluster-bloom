# CI Test Configuration for Bloom
# Minimal configuration for automated testing in QEMU VMs

CLUSTERFORGE_RELEASE: ""
DOMAIN: ci-test.local
FIRST_NODE: true
GPU_NODE: false
CLUSTER_DISKS: /dev/nvme0n1,/dev/nvme1n1
NO_DISKS_FOR_CLUSTER: false
USE_CERT_MANAGER: false
CERT_OPTION: generate
PRELOAD_IMAGES: ""
CLUSTER_SIZE: small
DNSMASQ: false
INSTALL_ARGOCD: false
